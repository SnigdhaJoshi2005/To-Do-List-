<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Questify — Shop</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: { extend: {
      colors: { mint:"#DDF5EF", sky:"#D9F1F6", pink:"#F9DCE8", lavender:"#E8DDF9" },
      fontFamily: { poppins: ["Poppins","sans-serif"] },
      borderRadius: { "3xl":"1.75rem", "4xl":"2.25rem" },
    }}
  }
</script>
<link rel="stylesheet" href="css/style.css" />
</head>
<body class="font-poppins relative overflow-x-hidden">

  <div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
    <div class="q-blob q-blob-1"></div>
    <div class="q-blob q-blob-2"></div>
    <div class="q-blob q-blob-3"></div>
  </div>

  <div class="relative z-10 lg:flex">
    <div id="questify-sidebar"></div>

    <div class="flex-1 min-w-0">
      <div id="questify-nav"></div>

      <main class="px-4 sm:px-6 py-6 max-w-5xl mx-auto">

        <div class="flex items-center justify-between mb-6 q-fade-in">
          <div>
            <h1 class="text-2xl font-semibold text-slate-700">Shop</h1>
            <p class="text-sm text-slate-500 mt-1">Spend coins earned from finished quests</p>
          </div>
          <div class="glass-card rounded-full px-4 py-2 flex items-center gap-2 text-amber-600 font-medium">
            <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><path d="M9 12h6M12 9v6"/></svg>
            <span id="shop-coins">0</span>
          </div>
        </div>

        <div id="shop-grid" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>

        <section class="glass-card rounded-4xl p-6 mt-8 q-fade-in">
          <h2 class="font-semibold text-slate-700 mb-4">Your Inventory</h2>
          <div id="shop-inventory" class="flex flex-wrap gap-2"></div>
          <p id="shop-inventory-empty" class="hidden text-sm text-slate-400 text-center py-6">Nothing collected yet.</p>
        </section>

      </main>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/mascot.js"></script>
  <script src="js/nav.js"></script>
  <script>
    const SHOP_ITEMS = [
  { id:"petal_succulent", name:"Petal Succulent", emoji:"🪴", price:15, desc:"A cozy pastel-pot succulent" },
  { id:"cloud_fern", name:"Cloud Fern", emoji:"🌿", price:20, desc:"Soft trailing fern" },
  { id:"lavender_sprig", name:"Lavender Sprig", emoji:"🪻", price:35, desc:"Fragrant purple bloom" },
  { id:"periwinkle_bloom", name:"Periwinkle Bloom", emoji:"🌸", price:30, desc:"Delicate blue-violet blossom" },
  { id:"blush_rose", name:"Blush Rose", emoji:"🌹", price:40, desc:"Soft pink garden rose" },
  { id:"moonlit_orchid", name:"Moonlit Orchid", emoji:"🌷", price:45, desc:"Rare lilac orchid" },
];

    function renderShop() {
      const stats = QData.getStats();
      document.getElementById("shop-coins").textContent = stats.coins;

      const grid = document.getElementById("shop-grid");
      grid.innerHTML = "";
      SHOP_ITEMS.forEach(item => {
        const owned = QData.getInventory().some(i => i.itemId === item.id);
        const card = document.createElement("div");
        card.className = "glass-card rounded-3xl p-5 flex flex-col items-center text-center q-fade-in";
        card.innerHTML = `
          <span class="text-4xl mb-3">${item.emoji}</span>
          <p class="font-medium text-slate-700 text-sm">${item.name}</p>
          <p class="text-xs text-slate-500 mt-1 mb-4">${item.desc}</p>
          <button class="q-btn ${owned ? "q-btn-ghost" : "q-btn-primary"} w-full text-sm" ${owned ? "disabled" : ""} data-id="${item.id}" data-price="${item.price}">
            ${owned ? "Owned" : `Buy · ${item.price} coins`}
          </button>
        `;
        if (!owned) {
          card.querySelector("button").addEventListener("click", () => {
            const ok = QData.spendCoins(item.price);
            if (ok) {
              QData.addItem(item.id, 1);
              renderShop();
            } else {
              card.querySelector("button").classList.add("animate-pulse");
              setTimeout(() => card.querySelector("button").classList.remove("animate-pulse"), 500);
            }
          });
        }
        grid.appendChild(card);
      });

      const inv = QData.getInventory();
      const invList = document.getElementById("shop-inventory");
      const invEmpty = document.getElementById("shop-inventory-empty");
      invList.innerHTML = "";
      if (inv.length === 0) {
        invEmpty.classList.remove("hidden");
      } else {
        invEmpty.classList.add("hidden");
        inv.forEach(i => {
          const item = SHOP_ITEMS.find(s => s.id === i.itemId);
          if (!item) return;
          const chip = document.createElement("div");
          chip.className = "flex items-center gap-2 bg-white/50 rounded-full px-3 py-1.5 text-sm text-slate-600";
          chip.innerHTML = `<span>${item.emoji}</span><span>${item.name}</span>`;
          invList.appendChild(chip);
        });
      }
    }

    renderShop();
    window.addEventListener("questify:update", renderShop);
  </script>
</body>
</html>
