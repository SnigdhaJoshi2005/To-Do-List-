<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Questify — Garden</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: { extend: {
      colors: { mint:"#DDF5EF", sky:"#D9F1F6", pink:"#F9DCE8", lavender:"#E8DDF9" },
      fontFamily: { poppins: ["Poppins","sans-serif"] },
      borderRadius: { "3xl":"1.75rem", "4xl":"2.25rem" },
    }}
  }
</script>
<link rel="stylesheet" href="css/style.css" />
</head>
<body class="font-poppins relative overflow-x-hidden">

  <div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
    <div class="q-blob q-blob-1"></div>
    <div class="q-blob q-blob-2"></div>
    <div class="q-blob q-blob-3"></div>
  </div>

  <div class="relative z-10 lg:flex">
    <div id="questify-sidebar"></div>

    <div class="flex-1 min-w-0">
      <div id="questify-nav"></div>

      <main class="px-4 sm:px-6 py-6 max-w-5xl mx-auto">

        <div class="mb-6 q-fade-in">
          <h1 class="text-2xl font-semibold text-slate-700">Your Garden</h1>
          <p class="text-sm text-slate-500 mt-1">Every completed quest plants something new!</p>
        </div>

        <!-- Garden bed -->
        <section class="glass-card rounded-4xl p-6 sm:p-8 mb-6 q-fade-in" style="animation-delay:.05s">
          <div id="garden-bed" class="grid grid-cols-4 sm:grid-cols-6 md:grid-cols-8 gap-3 sm:gap-4"></div>
          <p id="garden-empty" class="hidden text-center text-slate-400 text-sm py-10">
            Your garden is bare — complete a quest to plant your first seed 🌱
          </p>
        </section>

        <div class="grid sm:grid-cols-3 gap-4">
          <div class="glass-card rounded-3xl p-5 text-center q-fade-in">
            <p class="text-3xl mb-1" id="garden-count">0</p>
            <p class="text-xs text-slate-500">Plants grown</p>
          </div>
          <div class="glass-card rounded-3xl p-5 text-center q-fade-in" style="animation-delay:.05s">
            <p class="text-3xl mb-1" id="garden-level">1</p>
            <p class="text-xs text-slate-500">Gardener level</p>
          </div>
          <div class="glass-card rounded-3xl p-5 text-center q-fade-in" style="animation-delay:.1s">
            <p class="text-3xl mb-1" id="garden-streak">0</p>
            <p class="text-xs text-slate-500">Day streak</p>
          </div>
        </div>

      </main>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/mascot.js"></script>
  <script src="js/nav.js"></script>
  <script>
    const PLANTS = ["🌱", "🌿", "🍀", "🌾", "🌸", "🌼", "🌻", "🌷", "🪴", "🌵"];

    function renderGarden() {
      const done = QData.getTasks().filter(t => t.done);
      const stats = QData.getStats();
      const bed = document.getElementById("garden-bed");
      const empty = document.getElementById("garden-empty");
      bed.innerHTML = "";

      if (done.length === 0) {
        empty.classList.remove("hidden");
      } else {
        empty.classList.add("hidden");
        done.forEach((t, i) => {
          const plant = PLANTS[i % PLANTS.length];
          const pot = document.createElement("div");
          pot.className = "aspect-square rounded-2xl bg-white/50 flex flex-col items-center justify-center gap-1 q-fade-in";
          pot.style.animationDelay = `${(i % 12) * 0.03}s`;
          pot.title = t.title;
          pot.innerHTML = `<span class="text-2xl sm:text-3xl">${plant}</span>`;
          bed.appendChild(pot);
        });
      }

      document.getElementById("garden-count").textContent = done.length;
      document.getElementById("garden-level").textContent = stats.level;
      document.getElementById("garden-streak").textContent = stats.streak;
    }

    renderGarden();
    window.addEventListener("questify:update", renderGarden);
  </script>
</body>
</html>
