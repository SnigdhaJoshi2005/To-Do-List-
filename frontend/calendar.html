<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Questify — Calendar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: { extend: {
      colors: { mint:"#DDF5EF", sky:"#D9F1F6", pink:"#F9DCE8", lavender:"#E8DDF9" },
      fontFamily: { poppins: ["Poppins","sans-serif"] },
      borderRadius: { "3xl":"1.75rem", "4xl":"2.25rem" },
    }}
  }
</script>
<link rel="stylesheet" href="css/style.css" />
</head>
<body class="font-poppins relative overflow-x-hidden">

  <div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
    <div class="q-blob q-blob-1"></div>
    <div class="q-blob q-blob-2"></div>
    <div class="q-blob q-blob-3"></div>
  </div>

  <div class="relative z-10 lg:flex">
    <div id="questify-sidebar"></div>

    <div class="flex-1 min-w-0">
      <div id="questify-nav"></div>

      <main class="px-4 sm:px-6 py-6 max-w-5xl mx-auto">

        <div class="flex items-center justify-between mb-6 q-fade-in">
          <div class="flex items-center gap-3">
            <button id="cal-prev" class="p-2 rounded-xl bg-white/50 hover:bg-white/80 transition">
              <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 6-6 6 6 6"/></svg>
            </button>
            <h1 id="cal-title" class="text-xl sm:text-2xl font-semibold text-slate-700 min-w-[180px] text-center"></h1>
            <button id="cal-next" class="p-2 rounded-xl bg-white/50 hover:bg-white/80 transition">
              <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 6 6 6-6 6"/></svg>
            </button>
          </div>
          <button id="cal-today" class="q-btn q-btn-ghost text-sm">Today</button>
        </div>

        <div class="glass-card rounded-4xl p-4 sm:p-6 q-fade-in" style="animation-delay:.05s">
          <div class="grid grid-cols-7 gap-2 mb-2">
            <div class="text-center text-xs font-medium text-slate-400 py-1">Sun</div>
            <div class="text-center text-xs font-medium text-slate-400 py-1">Mon</div>
            <div class="text-center text-xs font-medium text-slate-400 py-1">Tue</div>
            <div class="text-center text-xs font-medium text-slate-400 py-1">Wed</div>
            <div class="text-center text-xs font-medium text-slate-400 py-1">Thu</div>
            <div class="text-center text-xs font-medium text-slate-400 py-1">Fri</div>
            <div class="text-center text-xs font-medium text-slate-400 py-1">Sat</div>
          </div>
          <div id="cal-grid" class="grid grid-cols-7 gap-2"></div>
        </div>

        <!-- Upcoming events -->
        <section class="glass-card rounded-4xl p-6 mt-6 q-fade-in" style="animation-delay:.1s">
          <h2 class="font-semibold text-slate-700 mb-4">Upcoming</h2>
          <div id="cal-upcoming" class="flex flex-col gap-2"></div>
          <p id="cal-upcoming-empty" class="hidden text-sm text-slate-400 text-center py-6">No events scheduled — click a day to add one 🗓️</p>
        </section>

      </main>
    </div>
  </div>

  <!-- Add Event Modal -->
  <div id="modal-backdrop" class="hidden fixed inset-0 bg-slate-900/25 backdrop-blur-sm z-50 items-center justify-center p-4">
    <div class="glass-card-solid rounded-4xl p-6 sm:p-7 w-full max-w-sm">
      <h3 class="font-semibold text-lg text-slate-700 mb-4">New Event</h3>
      <form id="event-form" class="flex flex-col gap-4">
        <div>
          <label class="text-xs text-slate-500 mb-1 block">Title</label>
          <input id="f-title" type="text" required placeholder="e.g. Team sync"
            class="w-full rounded-xl bg-white/70 border border-white/80 px-4 py-2.5 text-sm text-slate-700 focus:outline-none focus:ring-2 focus:ring-mint" />
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="text-xs text-slate-500 mb-1 block">Date</label>
            <input id="f-date" type="date" required class="w-full rounded-xl bg-white/70 border border-white/80 px-4 py-2.5 text-sm text-slate-700 focus:outline-none focus:ring-2 focus:ring-mint" />
          </div>
          <div>
            <label class="text-xs text-slate-500 mb-1 block">Time (optional)</label>
            <input id="f-time" type="time" class="w-full rounded-xl bg-white/70 border border-white/80 px-4 py-2.5 text-sm text-slate-700 focus:outline-none focus:ring-2 focus:ring-mint" />
          </div>
        </div>
        <div>
          <label class="text-xs text-slate-500 mb-1 block">Color</label>
          <div class="flex gap-2" id="f-color-group">
            <button type="button" data-color="mint" class="q-color-dot bg-mint ring-2 ring-offset-2 ring-emerald-300"></button>
            <button type="button" data-color="sky" class="q-color-dot bg-sky"></button>
            <button type="button" data-color="pink" class="q-color-dot bg-pink"></button>
            <button type="button" data-color="lavender" class="q-color-dot bg-lavender"></button>
          </div>
        </div>
        <div class="flex gap-3 mt-2">
          <button type="button" id="btn-cancel" class="q-btn q-btn-ghost flex-1">Cancel</button>
          <button type="submit" class="q-btn q-btn-primary flex-1">Add Event</button>
        </div>
      </form>
    </div>
  </div>

  <style>
    #modal-backdrop.flex { display: flex; }
    .q-color-dot { width: 1.75rem; height: 1.75rem; border-radius: 999px; transition: transform .15s ease; }
    .q-color-dot:hover { transform: scale(1.15); }
    .q-cal-day {
      aspect-ratio: 1; border-radius: 1rem; background: rgba(255,255,255,0.4);
      display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
      padding: 0.4rem 0.2rem; font-size: 0.8rem; color: #6b7688; cursor: pointer;
      transition: background 0.2s ease;
    }
    .q-cal-day:hover { background: rgba(255,255,255,0.75); }
    .q-cal-day.q-cal-today { background: linear-gradient(135deg, #DDF5EF, #E8DDF9); font-weight: 600; color: #3f4756; }
    .q-cal-day.q-cal-empty { visibility: hidden; }
    .q-cal-dot { width: 5px; height: 5px; border-radius: 999px; margin-top: 3px; }
  </style>

  <script src="js/data.js"></script>
  <script src="js/mascot.js"></script>
  <script src="js/nav.js"></script>
  <script>
    let viewDate = new Date();
    let selectedDate = null;
    const colorHex = { mint: "#8FD9BE", sky: "#8FCBE0", pink: "#E8A7C2", lavender: "#C3A9EE" };
    let chosenColor = "mint";

    function renderCalendar() {
      const year = viewDate.getFullYear();
      const month = viewDate.getMonth();
      document.getElementById("cal-title").textContent = viewDate.toLocaleDateString("en-US", { month: "long", year: "numeric" });

      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const todayStr = new Date().toISOString().slice(0, 10);
      const events = QData.getEvents();

      const grid = document.getElementById("cal-grid");
      grid.innerHTML = "";

      for (let i = 0; i < firstDay; i++) {
        const cell = document.createElement("div");
        cell.className = "q-cal-day q-cal-empty";
        grid.appendChild(cell);
      }

      for (let d = 1; d <= daysInMonth; d++) {
        const dateStr = `${year}-${String(month + 1).padStart(2, "0")}-${String(d).padStart(2, "0")}`;
        const dayEvents = events.filter(e => e.date === dateStr);
        const cell = document.createElement("div");
        cell.className = `q-cal-day ${dateStr === todayStr ? "q-cal-today" : ""}`;
        cell.innerHTML = `
          <span>${d}</span>
          <div class="flex gap-0.5">${dayEvents.slice(0,3).map(e => `<span class="q-cal-dot" style="background:${colorHex[e.color] || colorHex.mint}"></span>`).join("")}</div>
        `;
        cell.addEventListener("click", () => {
          selectedDate = dateStr;
          document.getElementById("f-date").value = dateStr;
          openModal();
        });
        grid.appendChild(cell);
      }

      renderUpcoming();
    }

    function renderUpcoming() {
      const todayStr = new Date().toISOString().slice(0, 10);
      const events = QData.getEvents()
        .filter(e => e.date >= todayStr)
        .sort((a, b) => (a.date + a.time).localeCompare(b.date + b.time))
        .slice(0, 6);

      const list = document.getElementById("cal-upcoming");
      const empty = document.getElementById("cal-upcoming-empty");
      list.innerHTML = "";

      if (events.length === 0) { empty.classList.remove("hidden"); return; }
      empty.classList.add("hidden");

      events.forEach(e => {
        const row = document.createElement("div");
        row.className = "flex items-center gap-3 bg-white/50 rounded-2xl px-4 py-3";
        row.innerHTML = `
          <span class="w-2.5 h-2.5 rounded-full" style="background:${colorHex[e.color] || colorHex.mint}"></span>
          <span class="flex-1 text-sm text-slate-600">${e.title}</span>
          <span class="text-xs text-slate-400">${e.date}${e.time ? " · " + e.time : ""}</span>
          <button class="q-del-event text-slate-300 hover:text-rose-400 transition" data-id="${e.id}">
            <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 6l12 12M18 6L6 18"/></svg>
          </button>
        `;
        row.querySelector(".q-del-event").addEventListener("click", () => {
          QData.deleteEvent(e.id);
          renderCalendar();
        });
        list.appendChild(row);
      });
    }

    document.getElementById("cal-prev").addEventListener("click", () => { viewDate.setMonth(viewDate.getMonth() - 1); renderCalendar(); });
    document.getElementById("cal-next").addEventListener("click", () => { viewDate.setMonth(viewDate.getMonth() + 1); renderCalendar(); });
    document.getElementById("cal-today").addEventListener("click", () => { viewDate = new Date(); renderCalendar(); });

    // Modal
    const backdrop = document.getElementById("modal-backdrop");
    function openModal() { backdrop.classList.remove("hidden"); backdrop.classList.add("flex"); }
    function closeModal() { backdrop.classList.add("hidden"); backdrop.classList.remove("flex"); document.getElementById("event-form").reset(); }
    document.getElementById("btn-cancel").addEventListener("click", closeModal);
    backdrop.addEventListener("click", (e) => { if (e.target === backdrop) closeModal(); });

    document.querySelectorAll(".q-color-dot").forEach(dot => {
      dot.addEventListener("click", () => {
        chosenColor = dot.dataset.color;
        document.querySelectorAll(".q-color-dot").forEach(d => d.classList.remove("ring-2","ring-offset-2","ring-emerald-300"));
        dot.classList.add("ring-2","ring-offset-2","ring-emerald-300");
      });
    });

    document.getElementById("event-form").addEventListener("submit", (e) => {
      e.preventDefault();
      QData.addEvent({
        title: document.getElementById("f-title").value.trim(),
        date: document.getElementById("f-date").value,
        time: document.getElementById("f-time").value,
        color: chosenColor,
      });
      closeModal();
      renderCalendar();
    });

    renderCalendar();
    window.addEventListener("questify:update", renderCalendar);
  </script>
</body>
</html>
